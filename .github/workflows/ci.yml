name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write
  packages: write

env:
  JDT_CORE_REPO: arcivanov/eclipse.jdt.core
  JDT_CORE_BRANCH: search-participant-extension-point
  JDTLS_REPO: arcivanov/eclipse.jdt.ls
  JDTLS_BRANCH: feature/search-participant-extension-point
  TYCHO_VERSION: '5.0.2'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.detect-release.outputs.release_version }}
    steps:
      - name: Checkout karellen-jdtls-kotlin
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release request
        id: detect-release
        if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]')
        run: |
          FIRST_LINE=$(echo "${{ github.event.head_commit.message }}" | head -1)
          if [[ "$FIRST_LINE" =~ \[release\ +([0-9]+\.[0-9]+\.[0-9]+)\] ]]; then
            echo "release_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "$FIRST_LINE" =~ \[release\] ]]; then
            CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "release_version=${CURRENT%-SNAPSHOT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout eclipse.jdt.core fork
        uses: actions/checkout@v6
        with:
          repository: ${{ env.JDT_CORE_REPO }}
          ref: ${{ env.JDT_CORE_BRANCH }}
          path: upstream/eclipse.jdt.core

      - name: Checkout eclipse.jdt.ls fork
        uses: actions/checkout@v6
        with:
          repository: ${{ env.JDTLS_REPO }}
          ref: ${{ env.JDTLS_BRANCH }}
          path: upstream/eclipse.jdt.ls

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          server-id: github

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '**/*.target') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Fix jdtls target platform URL
        run: |
          sed -i 's|https://download.eclipse.org/eclipse/updates/4.39-I-builds/|https://download.eclipse.org/eclipse/updates/4.39/|g' \
            upstream/eclipse.jdt.ls/org.eclipse.jdt.ls.target/org.eclipse.jdt.ls.tp.target

      - name: Build JDT Core fork
        run: mvn -f upstream/eclipse.jdt.core/pom.xml clean install -DskipTests -Dtycho.baseline.skip=true -B -q

      - name: Build jdtls fork
        run: mvn -f upstream/eclipse.jdt.ls/pom.xml clean install -DskipTests -B -q -pl '!org.eclipse.jdt.ls.product'

      - name: Build and test
        run: mvn clean verify -B

      - name: Determine artifact version
        id: artifact-version
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Package per-platform archives
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ steps.artifact-version.outputs.version }}"
          PRODUCTS="co.karellen.jdtls.kotlin.product/target/products/karellen-jdtls-kotlin.product"
          DIST="dist"
          mkdir -p "$DIST"

          tar czf "$DIST/karellen-jdtls-kotlin-${VERSION}-linux-gtk-x86_64.tar.gz" \
            -C "$PRODUCTS/linux/gtk/x86_64" \
            --exclude=artifacts.xml --exclude=p2 .

          tar czf "$DIST/karellen-jdtls-kotlin-${VERSION}-linux-gtk-aarch64.tar.gz" \
            -C "$PRODUCTS/linux/gtk/aarch64" \
            --exclude=artifacts.xml --exclude=p2 .

          tar czf "$DIST/karellen-jdtls-kotlin-${VERSION}-macosx-cocoa-x86_64.tar.gz" \
            -C "$PRODUCTS/macosx/cocoa/x86_64" \
            --exclude=artifacts.xml --exclude='Eclipse.app/Contents/Eclipse/p2' .

          tar czf "$DIST/karellen-jdtls-kotlin-${VERSION}-macosx-cocoa-aarch64.tar.gz" \
            -C "$PRODUCTS/macosx/cocoa/aarch64" \
            --exclude=artifacts.xml --exclude='Eclipse.app/Contents/Eclipse/p2' .

          (cd "$PRODUCTS/win32/win32/x86_64" && \
            zip -qr "$OLDPWD/$DIST/karellen-jdtls-kotlin-${VERSION}-win32-x86_64.zip" \
            . -x 'artifacts.xml' 'p2/*')

          ls -lh "$DIST/"

      - name: Upload karellen-jdtls-kotlin-linux-gtk-x86_64
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: karellen-jdtls-kotlin-linux-gtk-x86_64
          path: dist/*-linux-gtk-x86_64.tar.gz
          retention-days: 30

      - name: Upload karellen-jdtls-kotlin-linux-gtk-aarch64
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: karellen-jdtls-kotlin-linux-gtk-aarch64
          path: dist/*-linux-gtk-aarch64.tar.gz
          retention-days: 30

      - name: Upload karellen-jdtls-kotlin-macosx-cocoa-x86_64
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: karellen-jdtls-kotlin-macosx-cocoa-x86_64
          path: dist/*-macosx-cocoa-x86_64.tar.gz
          retention-days: 30

      - name: Upload karellen-jdtls-kotlin-macosx-cocoa-aarch64
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: karellen-jdtls-kotlin-macosx-cocoa-aarch64
          path: dist/*-macosx-cocoa-aarch64.tar.gz
          retention-days: 30

      - name: Upload karellen-jdtls-kotlin-win32-x86_64
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: karellen-jdtls-kotlin-win32-x86_64
          path: dist/*-win32-x86_64.zip
          retention-days: 30

      - name: Deploy to GitHub Packages
        if: github.ref == 'refs/heads/master'
        run: mvn deploy -DskipTests -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-test:
    needs: build
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: karellen-jdtls-kotlin-linux-gtk-x86_64
            extract: tar xzf *.tar.gz
            launcher: ./jdtls
            config: ./configuration
          - runner: ubuntu-24.04-arm
            artifact: karellen-jdtls-kotlin-linux-gtk-aarch64
            extract: tar xzf *.tar.gz
            launcher: ./jdtls
            config: ./configuration
          - runner: macos-15-intel
            artifact: karellen-jdtls-kotlin-macosx-cocoa-x86_64
            extract: tar xzf *.tar.gz
            launcher: ./Eclipse.app/Contents/MacOS/jdtls
            config: ./Eclipse.app/Contents/Eclipse/configuration
          - runner: macos-15
            artifact: karellen-jdtls-kotlin-macosx-cocoa-aarch64
            extract: tar xzf *.tar.gz
            launcher: ./Eclipse.app/Contents/MacOS/jdtls
            config: ./Eclipse.app/Contents/Eclipse/configuration
          - runner: windows-latest
            artifact: karellen-jdtls-kotlin-win32-x86_64
            extract: unzip -q *.zip
            launcher: ./jdtls.exe
            config: ./configuration
    runs-on: ${{ matrix.runner }}
    name: integration-test (${{ matrix.artifact }})
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: archive

      - name: Extract
        working-directory: archive
        run: ${{ matrix.extract }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Verify launcher exists
        working-directory: archive
        shell: bash
        run: |
          ls -la "${{ matrix.launcher }}"
          file "${{ matrix.launcher }}" || true

      - name: Smoke test — LSP initialize
        working-directory: archive
        shell: bash
        run: |
          WORKSPACE=$(mktemp -d)

          # LSP initialize request
          BODY='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":null,"rootUri":null,"capabilities":{}}}'
          HEADER="Content-Length: ${#BODY}\r\n\r\n"

          # Use a named pipe so we can feed stdin to the background process
          FIFO=$(mktemp -u)
          mkfifo "$FIFO"

          # Start jdtls in background reading from the pipe
          "${{ matrix.launcher }}" \
            -configuration "${{ matrix.config }}" \
            -data "$WORKSPACE" \
            --add-modules=ALL-SYSTEM \
            --add-opens java.base/java.util=ALL-UNNAMED \
            --add-opens java.base/java.lang=ALL-UNNAMED \
            <"$FIFO" >stdout.log 2>stderr.log &
          JDTLS_PID=$!

          # Send LSP initialize request (keep pipe open with sleep so jdtls doesn't get EOF)
          { echo -ne "${HEADER}${BODY}"; sleep 60; } > "$FIFO" &
          WRITER_PID=$!

          # Wait up to 60s for a response
          for i in $(seq 1 60); do
            if [ -s stdout.log ] && grep -q '"jsonrpc"' stdout.log 2>/dev/null; then
              break
            fi
            sleep 1
          done

          kill $WRITER_PID $JDTLS_PID 2>/dev/null || true
          wait $WRITER_PID 2>/dev/null || true
          wait $JDTLS_PID 2>/dev/null || true
          rm -f "$FIFO"

          echo "=== stderr ==="
          cat stderr.log | tail -20
          echo "=== stdout ==="
          cat stdout.log | head -20

          # Check for a valid LSP response
          if grep -q '"jsonrpc"' stdout.log; then
            echo "LSP initialize response received"
          else
            echo "ERROR: No LSP response received"
            exit 1
          fi

  release:
    needs: [build, integration-test]
    if: needs.build.outputs.release_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          server-id: github

      - name: Set release version, tag, and prepare next development version
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: |
          # Compute next development version (increment patch)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"

          # Set release version
          mvn org.eclipse.tycho:tycho-versions-plugin:${TYCHO_VERSION}:set-version \
            -DnewVersion="${RELEASE_VERSION}" -B -q
          git add -A
          git commit -m "Release ${RELEASE_VERSION}"
          git tag "v${RELEASE_VERSION}"

          # Set next development version
          mvn org.eclipse.tycho:tycho-versions-plugin:${TYCHO_VERSION}:set-version \
            -DnewVersion="${NEXT_VERSION}" -B -q
          git add -A
          git commit -m "Prepare for next development iteration ${NEXT_VERSION} [skip ci]"

          # Atomic push: both master and tag in one transaction
          git push --atomic origin master "v${RELEASE_VERSION}"

  publish:
    needs: [build, integration-test, release]
    if: always() && !cancelled() && needs.build.result == 'success' && needs.integration-test.result == 'success' && github.event_name == 'push' && (needs.release.result == 'success' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ needs.build.outputs.release_version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: dist/*
          generate_release_notes: true
