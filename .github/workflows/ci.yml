name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  actions: write
  contents: write
  packages: write

env:
  TYCHO_VERSION: '5.0.2'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.detect-release.outputs.release_version }}
    steps:
      - name: Checkout karellen-jdtls-kotlin
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release request
        id: detect-release
        if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]')
        run: |
          FIRST_LINE=$(echo "${{ github.event.head_commit.message }}" | head -1)
          if [[ "$FIRST_LINE" =~ \[release\ +([0-9]+\.[0-9]+\.[0-9]+)\] ]]; then
            echo "release_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          elif [[ "$FIRST_LINE" =~ \[release\] ]]; then
            CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
            echo "release_version=${CURRENT%-SNAPSHOT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          server-id: github

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '**/*.target') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download fork m2 repository
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -eEuo pipefail
          FORKS_TAG=$(gh release list --repo karellen/karellen-jdtls \
            --json tagName -q '[.[] | select(.tagName | startswith("forks-"))][0].tagName')
          echo "Downloading fork m2 from release $FORKS_TAG"
          gh release download "$FORKS_TAG" --repo karellen/karellen-jdtls \
            -p m2-forks.tar.gz -D .
          mkdir -p ~/.m2/repository
          tar xzf m2-forks.tar.gz -C ~/.m2/repository
          rm m2-forks.tar.gz

      - name: Build and test with coverage
        run: mvn clean install -B

      - name: Publish snapshot m2 artifacts
        if: github.ref == 'refs/heads/master'
        run: |
          set -eEuo pipefail
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          tar czf m2-kotlin-plugin.tar.gz -C ~/.m2/repository co/karellen .meta
          gh release create "$VERSION" --prerelease --title "$VERSION" \
            --notes "Snapshot build" || true
          gh release upload "$VERSION" m2-kotlin-plugin.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Format JaCoCo XML for Coveralls
        if: always() && hashFiles('co.karellen.jdtls.kotlin.coverage/target/site/jacoco/jacoco.xml') != ''
        run: |
          python3 << 'PYEOF'
          import re, xml.etree.ElementTree as ET
          path = "co.karellen.jdtls.kotlin.coverage/target/site/jacoco/jacoco.xml"
          with open(path) as f:
              content = f.read()
          # Remove DOCTYPE (Crystal XML parser fails resolving report.dtd)
          content = re.sub(r'<!DOCTYPE[^>]*>', '', content)
          # Unwrap <group> elements — report-aggregate wraps packages
          # in <group> but Coveralls expects /report/package directly
          root = ET.fromstring(content)
          for group in root.findall('group'):
              for child in list(group):
                  root.append(child)
              root.remove(group)
          ET.indent(root)
          tree = ET.ElementTree(root)
          tree.write(path, xml_declaration=True, encoding='unicode')
          PYEOF

      - name: Upload coverage to Coveralls
        if: always() && hashFiles('co.karellen.jdtls.kotlin.coverage/target/site/jacoco/jacoco.xml') != ''
        uses: coverallsapp/github-action@v2
        with:
          file: co.karellen.jdtls.kotlin.coverage/target/site/jacoco/jacoco.xml
          format: jacoco
          base-path: co.karellen.jdtls.kotlin/src

  release:
    needs: build
    if: needs.build.outputs.release_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          server-id: github

      - name: Set release version, tag, and prepare next development version
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: |
          # Compute next development version (increment patch)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"

          # Set release version
          mvn org.eclipse.tycho:tycho-versions-plugin:${TYCHO_VERSION}:set-version \
            -DnewVersion="${RELEASE_VERSION}" -B -q
          git add -A
          git commit -m "Release ${RELEASE_VERSION}"
          git tag "v${RELEASE_VERSION}"

          # Set next development version
          mvn org.eclipse.tycho:tycho-versions-plugin:${TYCHO_VERSION}:set-version \
            -DnewVersion="${NEXT_VERSION}" -B -q
          git add -A
          git commit -m "Prepare for next development iteration ${NEXT_VERSION} [skip ci]"

          # Atomic push: both master and tag in one transaction
          git push --atomic origin master "v${RELEASE_VERSION}"

  publish:
    needs: [build, release]
    if: >-
      always() && !cancelled()
      && needs.build.result == 'success'
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'
          server-id: github

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml', '**/*.target') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download fork m2 repository
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -eEuo pipefail
          FORKS_TAG=$(gh release list --repo karellen/karellen-jdtls \
            --json tagName -q '[.[] | select(.tagName | startswith("forks-"))][0].tagName')
          echo "Downloading fork m2 from release $FORKS_TAG"
          gh release download "$FORKS_TAG" --repo karellen/karellen-jdtls \
            -p m2-forks.tar.gz -D .
          mkdir -p ~/.m2/repository
          tar xzf m2-forks.tar.gz -C ~/.m2/repository
          rm m2-forks.tar.gz

      - name: Deploy to GitHub Packages
        run: mvn deploy -DskipTests -pl '!co.karellen.jdtls.kotlin.tests,!co.karellen.jdtls.kotlin.coverage' -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger karellen-jdtls build (release)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh api repos/karellen/karellen-jdtls/dispatches \
            -f event_type=kotlin-plugin-release \
            -f 'client_payload[tag]'="${GITHUB_REF_NAME}" \
            -f 'client_payload[run_id]'="${{ github.run_id }}"

      - name: Trigger karellen-jdtls build (snapshot)
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          gh api repos/karellen/karellen-jdtls/dispatches \
            -f event_type=kotlin-plugin-snapshot \
            -f 'client_payload[version]'="$VERSION" \
            -f 'client_payload[run_id]'="${{ github.run_id }}"
