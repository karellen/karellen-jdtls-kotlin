name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.0.0). Leave empty to derive from current SNAPSHOT.'
        required: false
        type: string
      next_version:
        description: 'Next development version (e.g., 1.0.1-SNAPSHOT). Leave empty to auto-increment patch.'
        required: false
        type: string

permissions:
  contents: write

env:
  TYCHO_VERSION: '5.0.2'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Determine versions
        id: versions
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

          if [ -n "${{ inputs.release_version }}" ]; then
            RELEASE_VERSION="${{ inputs.release_version }}"
          else
            RELEASE_VERSION="${CURRENT%-SNAPSHOT}"
          fi

          if [ -n "${{ inputs.next_version }}" ]; then
            NEXT_VERSION="${{ inputs.next_version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE_VERSION"
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          fi

          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release: ${RELEASE_VERSION}, Next: ${NEXT_VERSION}"

      - name: Set release version, tag, and prepare next development version
        env:
          RELEASE_VERSION: ${{ steps.versions.outputs.release_version }}
          NEXT_VERSION: ${{ steps.versions.outputs.next_version }}
        run: |
          # Set release version
          mvn org.eclipse.tycho:tycho-versions-plugin:${TYCHO_VERSION}:set-version \
            -DnewVersion="${RELEASE_VERSION}" -B -q
          git add -A
          git commit -m "Release ${RELEASE_VERSION}"
          git tag "v${RELEASE_VERSION}"

          # Set next development version
          mvn org.eclipse.tycho:tycho-versions-plugin:${TYCHO_VERSION}:set-version \
            -DnewVersion="${NEXT_VERSION}" -B -q
          git add -A
          git commit -m "Prepare for next development iteration ${NEXT_VERSION} [skip ci]"

          # Atomic push: both master and tag in one transaction
          git push --atomic origin master "v${RELEASE_VERSION}"
